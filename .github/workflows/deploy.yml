name: Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Project
        run: npm run build

  deploy:
    needs: build-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        # Uses the Render Deploy Hook Webhook URL securely stored in GitHub Secrets
        # Go to Repository Settings > Secrets and Variables > Actions
        # Add a new secret named RENDER_DEPLOY_HOOK
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set!"
            exit 1
          fi
          curl -X POST -d "" ${{ secrets.RENDER_DEPLOY_HOOK }}
          echo "Deployment triggered successfully!"
