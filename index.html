<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>WorrkFree Workspace</title>
    <style>
      /* BUG-001 FIX: Loading spinner shown instantly during cold start, before React mounts */
      #root-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #root-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-logo {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #4F46E5, #7C3AED);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 800;
        color: white;
        margin-bottom: 24px;
        box-shadow: 0 8px 32px rgba(79, 70, 229, 0.35);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .loader-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #E0E7FF;
        border-top: 3px solid #4F46E5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader-text {
        margin-top: 16px;
        font-size: 13px;
        font-weight: 600;
        color: #6366F1;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        letter-spacing: 0.02em;
      }
      .loader-sub {
        margin-top: 6px;
        font-size: 11px;
        color: #94A3B8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- BUG-001 FIX: Instant loader — visible before React JS even parses -->
    <div id="root-loader">
      <div class="loader-logo">W</div>
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading WorrkFree...</div>
      <div class="loader-sub">Starting up workspace</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide loader once React has mounted
      document.addEventListener('DOMContentLoaded', function() {
        const observer = new MutationObserver(function() {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loader = document.getElementById('root-loader');
            if (loader) {
              loader.classList.add('hidden');
              setTimeout(() => loader.remove(), 400);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
